version: "3.9"
services:
   php-fpm:
      restart: unless-stopped
      env_file:
         - ./app/.env
      build:
         context: .
         dockerfile: .docker/Dockerfile.php
      container_name: stm_php
      volumes:
         - ./app:/home/app
      networks:
         - internal

   nginx:
      restart: unless-stopped
      env_file:
         - ./app/.env
      container_name: stm_nginx
      build:
         context: .
         dockerfile: .docker/Dockerfile.nginx
      ports:
         - "80:80"
      volumes:
         - ./app:/home/app
      depends_on:
         - php-fpm
      networks:
         - internal

   db:
      image: postgres:17.6
      env_file:
         - ./app/.env
      restart: unless-stopped
      container_name: stm_db
      environment:
         POSTGRES_USER: user1
         POSTGRES_PASSWORD: password1
         POSTGRES_DB: stmdb
      healthcheck:
         test: ["CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'"]
         timeout: 5s
         retries: 5
         start_period: 60s
      ports:
         - "5432:5432"
      volumes:
         - ./.db:/var/lib/postgresql/data
      networks:
         - internal

networks:
   internal:
      driver: bridge
      ipam:
         driver: default