name: Tests

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.4']   # PHPUnit 13.2 требует php >=8.4.1
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: ctype, iconv, mbstring
          coverage: pcov
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php-version }}-${{ hashFiles('app/composer.lock') }}
          restore-keys: composer-${{ matrix.php-version }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --no-scripts

      - name: Run unit tests with coverage
        run: php bin/phpunit --coverage-clover coverage.clover

      - name: Enforce minimum line coverage (80%)
        run: |
          php -r '
            $min = 80.0;
            $xml = simplexml_load_file("coverage.clover");
            $m = $xml->project->metrics;
            $total = (int) $m["statements"];
            $covered = (int) $m["coveredstatements"];
            $pct = $total > 0 ? $covered / $total * 100 : 0.0;
            printf("Line coverage: %.2f%% (%d/%d), minimum: %.0f%%\n", $pct, $covered, $total, $min);
            if ($pct < $min) {
                fwrite(STDERR, sprintf("Coverage %.2f%% is below the required %.0f%%\n", $pct, $min));
                exit(1);
            }
          '
